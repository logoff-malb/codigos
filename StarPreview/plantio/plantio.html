  function gerarDias() {
    const calendario = document.getElementById("calendario");

    // Limpa antes de recriar
    document.querySelectorAll(".dia").forEach(el => el.remove());

    const larguraUtil = 480 - 16 - 15;  // 450px
    const alturaUtil  = 336 - 64 - 15;  // 258px

    const cols = 7;
    const rows = 4;

    const sizeX = larguraUtil / cols;
    const sizeY = alturaUtil / rows;

    for (let i = 1; i <= 28; i++) {
      const btn = document.createElement("button");
      btn.className = "dia";

      const row = Math.floor((i - 1) / cols);
      const col = (i - 1) % cols;

      btn.style.width = sizeX + "px";
      btn.style.height = sizeY + "px";
      btn.style.top = (64 + row * sizeY) + "px";   // respeita margem superior
      btn.style.left = (16 + col * sizeX) + "px";  // respeita margem esquerda

      btn.title = `Dia ${i}`; // tooltip opcional

      btn.addEventListener("click", () => selecionarDia(i, btn));
      const evento = eventosFixos[estacaoAtual]?.[i];
      if (evento) {
        btn.classList.add(evento.tipo);
        btn.title = `${evento.nome} (${evento.tipo})`;
      }

      calendario.appendChild(btn);

      if (i === diaSelecionado) btn.classList.add("selecionado");
    }
  }

 function selecionarDia(dia, botao) {
  // limpa seleção visual só do calendário atual
  document.querySelectorAll(".dia").forEach(b => b.classList.remove("selecionado"));
  botao.classList.add("selecionado");

  // grava seleção para a estação atual
  Estacao[estacaoAtual] = dia;

  // grava também a estação do dia selecionado
  diaSelecionado = dia;
  estacaoDiaSelecionado = estacaoAtual;

  // atualiza painel
  atualizarPainel();

  // abre painel se estava retraído
  const painel = document.getElementById("painelEventos");
  const btn = document.getElementById("togglePainel");
  if (painel.classList.contains("retraido")) {
    painel.classList.remove("retraido");
    if (btn) btn.textContent = "▶";
  }
}

<script> 
<!-- modal de tarefas de plantio-->
// --- VARIÁVEIS GLOBAIS E SELETORES ---
let itemSelecionadoPlantio = null;
let eventosPess = [];
const STORAGE_KEY_PESS = "sv_eventos_pess";

// Elementos do DOM (Capturados após o carregamento)
let modalPlantio, listaItensContainer, filtroSelect;

function inicializarComponentes() {
    modalPlantio = document.getElementById('modalPlantio');
    listaItensContainer = document.getElementById('listaItens');
    filtroSelect = document.getElementById('filtroPlantio');

    // Ouvintes de validação em tempo real
    ['diaPlantio', 'estacaoPlantio', 'checkEstufa', 'checkIlha'].forEach(id => {
        document.getElementById(id).addEventListener('change', validarPlantioDinamico);
    });

    filtroSelect.addEventListener('change', atualizarListaItensPlantio);

    document.getElementById('confirmarPlantio').onclick = () => {
        if (itemSelecionadoPlantio) {
            criarEventoPlantio(itemSelecionadoPlantio);
        }
    }; 
    renderizarPainelPess();
  }

// --- LÓGICA DO MODAL DE PLANTIO ---
function abrirModalPlantio() {
    // Sincroniza o modal com o dia selecionado no calendário principal
    if (diaSelecionado) {
        document.getElementById('diaPlantio').value = diaSelecionado;
        document.getElementById('estacaoPlantio').value = estacaoAtual;
    }

    modalPlantio.showModal();
    atualizarListaItensPlantio();
    
    itemSelecionadoPlantio = null;
    document.getElementById('msgViabilidade').textContent = "Selecione uma semente...";
    document.getElementById('confirmarPlantio').disabled = true;
    document.getElementById('nomeItem').textContent = "Selecione";
    document.getElementById('imagemItem').src = "";
  
  }

function atualizarListaItensPlantio() {
    if (!jsonItens.length) return;
    
    let listaFiltrada = jsonItens;
    const termoFiltro = filtroSelect.value;

    if (termoFiltro === 'estacao') {
        listaFiltrada = jsonItens.filter(i => i.estacao?.includes(estacaoAtual));
    } else if (termoFiltro !== 'todos') {
        listaFiltrada = jsonItens.filter(i => i.tipo?.includes(termoFiltro) || i.diaPlantio);
    }

    renderizarItensPlantio(listaFiltrada);
}

function renderizarItensPlantio(itens) {
    listaItensContainer.innerHTML = "";
    itens.forEach(item => {
        const itemDiv = document.createElement("div");
        itemDiv.className = "item-plantio";
        itemDiv.innerHTML = `
            <img src="../${item.imagem}" alt="${item.nome}">
            <p>${item.nome}</p>
        `;
        itemDiv.onclick = () => {
            itemSelecionadoPlantio = item;
            document.getElementById('nomeItem').textContent = item.nome;
            //document.getElementById('imagemItem').src = item.imagem;
            document.getElementById('imagemItem').src = `../imagens/${item.imagem.replace(/\\/g, "/")}`;
            document.querySelectorAll(".item-plantio").forEach(el => el.classList.remove("selecionado"));
            itemDiv.classList.add("selecionado");
            validarPlantioDinamico();
        };
        listaItensContainer.appendChild(itemDiv);
    });
}

function validarPlantioDinamico() {
    if (!itemSelecionadoPlantio) return;

    // CORREÇÃO: Forçar a conversão para Number com parseInt() ou Number()
    const diaInput = document.getElementById('diaPlantio').value;
    const dia = parseInt(diaInput, 10); 
    const estacao = document.getElementById('estacaoPlantio').value;
    const estufa = document.getElementById('checkEstufa').checked;
    const ilha = document.getElementById('checkIlha').checked;
    
    // Garante que o tempo de crescimento seja um número
    const diasCrescimento = parseInt(itemSelecionadoPlantio.diaPlantio || 0, 10);
    
    const estacoesOk = Array.isArray(itemSelecionadoPlantio.estacao) ? 
                       itemSelecionadoPlantio.estacao.includes(estacao) : 
                       itemSelecionadoPlantio.estacao === estacao;

    // Agora a soma será matemática: 16 + 14 = 30
    const diaColheita = dia + diasCrescimento;

    let viavel = (estufa || ilha) || (estacoesOk && (diaColheita <= 28));
    
    let msg = viavel 
        ? `✅ Viável! Colheita dia ${diaColheita}` 
        : `❌ Impossível concluir nesta estação (Dia ${diaColheita}).`;
    
    if (!estacoesOk && !estufa && !ilha) msg = `❌ Não cresce em: ${estacao}`;

    const msgEl = document.getElementById('msgViabilidade');
    msgEl.textContent = msg;
    msgEl.style.color = viavel ? "#155724" : "#721c24";
    document.getElementById('confirmarPlantio').disabled = !viavel;
}
// --- SISTEMA DE EVENTOS E STORAGE ---

function criarEventoPlantio(item) {
    const dia = parseInt(document.getElementById('diaPlantio').value);
    const estacao = document.getElementById('estacaoPlantio').value;
    
    let dataAtual = { dia, estacao, ano: 1 };
    const colheitas = [];
    
    // Simulação básica de avanço de tempo para colheita
    let diaFinal = dia + (item.diaPlantio || 0);
    let estacaoFinal = estacao;
    if (diaFinal > 28) { /* Lógica de virada de estação se necessário */ }

    const novoEvento = {
        id: Date.now(),
        nome: item.nome,
        dataPlantio: `Dia ${dia} de ${estacao}`,
        status: "Crescendo",
        colheitas: [{ dia: diaFinal, estacao: estacaoFinal, tipo: "Colheita" }]
    };

    eventosPess.push(novoEvento);
    localStorage.setItem(STORAGE_KEY_PESS, JSON.stringify(eventosPess));
    renderizarPainelPess();
    modalPlantio.close();
}

function renderizarPainelPess() {
    carregarPessStorage();
    const raw = localStorage.getItem(STORAGE_KEY_PESS);
    eventosPess = raw ? JSON.parse(raw) : [];
    
    const container = document.getElementById("listaPess");
    container.innerHTML = eventosPess.length ? "" : "<p>Nenhuma tarefa...</p>";

    eventosPess.forEach(ev => {
        const box = document.createElement("div");
        box.className = "caixa-evento";
        box.innerHTML = `
            <strong>${ev.nome}</strong> - ${ev.dataPlantio}
            <button onclick="excluirEventoPess(${ev.id})">🗑️</button>
        `;
        container.appendChild(box);
    });
}

// Inicialização única
window.addEventListener("DOMContentLoaded", inicializarComponentes);
window.addEventListener("DOMContentLoaded", renderizarPainelPess);
</script>
