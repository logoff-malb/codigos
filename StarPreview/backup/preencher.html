<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Propriedades de Itens</title>
    <style>
        /* Estilos CSS (inalterados) */
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f9;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #007bff;
            margin-bottom: 20px;
        }

        .item-box {
            border: 2px solid #007bff;
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 20px;
            background-color: #e9f7ff;
            min-height: 400px;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 10px;
        }

        .item-header h2 {
            margin: 0;
            color: #333;
        }

        .item-header span {
            font-weight: bold;
            color: #007bff;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input[type="text"],
        .form-group input[type="number"],
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        
        .form-group.boolean-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .form-group.boolean-group input[type="checkbox"] {
            width: auto;
            margin-right: 5px;
        }
        
        .array-input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .navigation-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .navigation-buttons button,
        #generateJson {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }

        #prevItem, #nextItem {
            background-color: #6c757d;
            color: white;
        }
        
        #prevItem:hover, #nextItem:hover {
            background-color: #5a6268;
        }
        
        #generateJson {
            background-color: #28a745;
            color: white;
            width: 100%;
            margin-top: 20px;
        }

        #generateJson:hover {
            background-color: #218838;
        }

        #prevItem:disabled, #nextItem:disabled {
            background-color: #adb5bd;
            cursor: not-allowed;
        }

        #outputJsonContainer {
            margin-top: 30px;
            padding: 15px;
            border: 1px dashed #007bff;
            border-radius: 4px;
            background-color: #f8f9fa;
        }

        #outputJson {
            width: 100%;
            height: 300px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: vertical;
            font-family: 'Consolas', 'Courier New', monospace;
            white-space: pre-wrap;
            background-color: #fff;
        }
    </style>
</head>

            {"id":69,"nome":"tulipa","valorBase":250,"tipo":["flor"],"prVinho":true,"prGeleia":true,"prSuco":false,"prPicles":false,"except":false,"imagem":"imagens/melao.p[ng]","diaPlantio":"" ,"diaColheita":"","estacao":[""],"precoSemente":""},

        ];

        // Variáveis Globais
        let editableData = JSON.parse(JSON.stringify(initialData));
        let currentIndex = 0;

        // Mapeamento de chaves para nomes de campo (para exibição)
        const fieldLabels = {
            id: 'ID',
            nome: 'Nome',
            valorBase: 'Valor Base (numérico)',
            precoSemente: 'Preço Semente (string)', 
            tipo: 'Tipo (Separar por vírgula)',
            prVinho: 'Preparo Vinho?',
            prGeleia: 'Preparo Geleia?',
            prSuco: 'Preparo Suco?',
            prPicles: 'Preparo Picles?',
            except: 'Exceção?',
            imagem: 'Caminho Imagem',
            diaPlantio: 'Dia Plantio (string)',
            diaColheita: 'Dia Colheita (string)',
            estacao: 'Estação (Separar por vírgula)'
        };

        let itemBox, prevButton, nextButton, generateJsonButton, outputJsonContainer, outputJsonTextarea;
        
        function initializeDomReferences() {
            itemBox = document.getElementById('itemBox');
            prevButton = document.getElementById('prevItem');
            nextButton = document.getElementById('nextItem');
            generateJsonButton = document.getElementById('generateJson');
            outputJsonContainer = document.getElementById('outputJsonContainer');
            outputJsonTextarea = document.getElementById('outputJson');
        }

        /**
         * Gera o formulário HTML para o item atual.
         */
        function renderItemForm(item) {
            let html = `
                <div class="item-header">
                    <h2>${item.nome}</h2>
                    <span>Item ${currentIndex + 1} de ${editableData.length} (ID: ${item.id})</span>
                </div>
                <form id="itemForm">
            `;

            for (const key in item) {
                if (key === 'id' || key === 'nome') {
                    html += `
                        <div class="form-group">
                            <label for="${key}">${fieldLabels[key] || key}:</label>
                            <input type="text" id="${key}" value="${item[key] || ''}" disabled>
                        </div>
                    `;
                    continue;
                }

                const label = fieldLabels[key] || key;

                if (typeof item[key] === 'boolean') {
                    const checked = item[key] ? 'checked' : '';
                    html += `
                        <div class="form-group boolean-group">
                            <label for="${key}">${label}:</label>
                            <input type="checkbox" id="${key}" data-key="${key}" ${checked}>
                        </div>
                    `;
                } else if (Array.isArray(item[key])) {
                    // Exibe array vazio [] como string vazia no textarea para edição
                    const value = item[key].length === 0 || (item[key].length === 1 && item[key][0] === "") ? "" : item[key].join(', '); 
                    html += `
                        <div class="form-group">
                            <label for="${key}">${label}:</label>
                            <textarea id="${key}" class="array-input" data-key="${key}" rows="2">${value}</textarea>
                        </div>
                    `;
                } else {
                    // Trata 'valorBase' como número e os demais (incluindo 'diaPlantio', 'diaColheita', 'precoSemente') como texto
                    const type = key === 'valorBase' ? 'number' : 'text'; 
                    const value = item[key] !== undefined && item[key] !== null ? item[key] : '';
                    
                    const firstEditableAttr = (key === 'valorBase') ? 'data-first-editable' : ''; 

                    html += `
                        <div class="form-group">
                            <label for="${key}">${label}:</label>
                            <input type="${type}" id="${key}" data-key="${key}" value="${value}" ${type === 'number' ? 'min="0"' : ''} ${firstEditableAttr}>
                        </div>
                    `;
                }
            }

            html += '</form>';
            return html;
        }

        /**
         * Salva os dados do formulário atual no objeto editableData.
         */
        function saveCurrentItem() {
            const currentItem = editableData[currentIndex];
            const form = document.getElementById('itemForm');
            if (!form) return;

            for (const key in currentItem) {
                const element = document.getElementById(key);

                if (!element || key === 'id' || key === 'nome') continue;

                if (element.type === 'checkbox') {
                    currentItem[key] = element.checked;
                } else if (Array.isArray(currentItem[key])) {
                    // Lógica corrigida para arrays: Se o campo estiver vazio, salva como []
                    const rawValue = element.value.trim();
                    if (rawValue) {
                        currentItem[key] = rawValue.split(',').map(s => s.trim()).filter(s => s.length > 0);
                    } else {
                        currentItem[key] = []; // Salva como array vazio se estiver em branco
                    }
                } else if (element.type === 'number') {
                    const numValue = parseFloat(element.value);
                    // Garante que se o campo tiver um valor (incluindo "0"), ele seja salvo corretamente
                    currentItem[key] = element.value === "" ? "" : (isNaN(numValue) ? element.value : numValue);
                } else {
                    // Lógica para campos de string (como diaColheita, diaPlantio, precoSemente): 
                    // Salva exatamente o que está no campo, incluindo "0" ou ""
                    currentItem[key] = element.value;
                }
            }
        }

        /**
         * Navega para um novo índice de item.
         */
        function navigateToItem(newIndex) {
            if (newIndex >= 0 && newIndex < editableData.length) {
                saveCurrentItem();
                
                currentIndex = newIndex;
                
                itemBox.innerHTML = renderItemForm(editableData[currentIndex]);
                
                // Rola para o topo e foca
                itemBox.scrollIntoView({ behavior: 'smooth', block: 'start' });

                const firstField = document.querySelector('#itemBox [data-first-editable]');
                if (firstField) {
                    firstField.focus();
                }

                updateNavigationButtons();
            }
        }

        /**
         * Atualiza o estado dos botões Anterior e Próximo.
         */
        function updateNavigationButtons() {
            prevButton.disabled = currentIndex === 0;
            nextButton.disabled = currentIndex === editableData.length - 1;
        }

        /**
         * Lida com a navegação por teclado.
         */
        function handleKeyDown(event) {
            // Verifica se o foco está em um campo de entrada editável
            const activeTag = document.activeElement.tagName;
            const isInputFocused = activeTag === 'INPUT' || activeTag === 'TEXTAREA';
            
            // Navega para o próximo item
            if (event.key === 'ArrowRight' && !isInputFocused) {
                event.preventDefault(); 
                navigateToItem(currentIndex + 1);
            }
            
            // Navega para o item anterior
            if (event.key === 'ArrowLeft' && !isInputFocused) {
                event.preventDefault(); 
                navigateToItem(currentIndex - 1);
            }
        }

        /**
         * Event handler para o botão 'Gerar JSON'.
         */
        function handleGenerateJson() {
            saveCurrentItem(); 
            
            outputJsonContainer.style.display = 'block';

            // Gerador JSON: Não aplica nenhuma substituição de valor, garantindo que "" ou [] sejam salvos como estão.
            const jsonOutput = JSON.stringify(editableData, null, 4); 

            outputJsonTextarea.value = jsonOutput;
            outputJsonTextarea.focus();
            outputJsonTextarea.select(); 
        }

        /**
         * Função de inicialização principal.
         */
        function initializeEditor() {
            initializeDomReferences();

            // 1. Carrega o primeiro item (Abacaxi)
            navigateToItem(0);

            // 2. Configura os Listeners de eventos
            prevButton.addEventListener('click', () => {
                navigateToItem(currentIndex - 1);
            });

            nextButton.addEventListener('click', () => {
                navigateToItem(currentIndex + 1);
            });

            generateJsonButton.addEventListener('click', handleGenerateJson);
            
            // Listener para navegação por teclado (Seta Direita e Seta Esquerda)
            window.addEventListener('keydown', handleKeyDown);
        }

        // Garante que a inicialização só ocorra após o DOM estar pronto
        window.addEventListener('load', initializeEditor);

    </script>
