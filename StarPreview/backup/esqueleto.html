  function gerarDias() {
    const calendario = document.getElementById("calendario");

    // Limpa antes de recriar
    document.querySelectorAll(".dia").forEach(el => el.remove());

    const larguraUtil = 480 - 16 - 15;  // 450px
    const alturaUtil  = 336 - 64 - 15;  // 258px

    const cols = 7;
    const rows = 4;

    const sizeX = larguraUtil / cols;
    const sizeY = alturaUtil / rows;

    for (let i = 1; i <= 28; i++) {
      const btn = document.createElement("button");
      btn.className = "dia";

      const row = Math.floor((i - 1) / cols);
      const col = (i - 1) % cols;

      btn.style.width = sizeX + "px";
      btn.style.height = sizeY + "px";
      btn.style.top = (64 + row * sizeY) + "px";   // respeita margem superior
      btn.style.left = (16 + col * sizeX) + "px";  // respeita margem esquerda

      btn.title = `Dia ${i}`; // tooltip opcional

      btn.addEventListener("click", () => selecionarDia(i, btn));
      const evento = eventosFixos[estacaoAtual]?.[i];
      if (evento) {
        btn.classList.add(evento.tipo);
        btn.title = `${evento.nome} (${evento.tipo})`;
      }

      calendario.appendChild(btn);

      if (i === diaSelecionado) btn.classList.add("selecionado");
    }
  }

 function selecionarDia(dia, botao) {
  // limpa seleção visual só do calendário atual
  document.querySelectorAll(".dia").forEach(b => b.classList.remove("selecionado"));
  botao.classList.add("selecionado");

  // grava seleção para a estação atual
  Estacao[estacaoAtual] = dia;

  // grava também a estação do dia selecionado
  diaSelecionado = dia;
  estacaoDiaSelecionado = estacaoAtual;

  // atualiza painel
  atualizarPainel();

  // abre painel se estava retraído
  const painel = document.getElementById("painelEventos");
  const btn = document.getElementById("togglePainel");
  if (painel.classList.contains("retraido")) {
    painel.classList.remove("retraido");
    if (btn) btn.textContent = "▶";
  }
}

<script>
    let itemSelecionadoPlantio = null; // Guarda o item clicado

    const modalPlantio = document.getElementById('modalPlantio');
    const listaItensContainer = document.getElementById('listaItens');
    const filtroSelect = document.getElementById('filtroPlantio');

    // Listener para o botão 'Criar Evento'
    document.getElementById('confirmarPlantio').onclick = () => {
        if (itemSelecionadoPlantio) {
            criarEventoPlantio(itemSelecionadoPlantio);
            itemSelecionadoPlantio = null; // Limpa a seleção após criar
        } else {
            alert("Selecione um item para plantar.");
        }
    };

    // Abre modal de plantio
    function abrirModalPlantio() {
        modalPlantio.style.display = 'flex';
        atualizarListaItensPlantio();
        
        // Exibir dia base no modal
        const { dia, estacao, ano } = obterDiaBase();
        document.getElementById('nomeItem').innerHTML = `**Base Plantio:**<br> Dia ${dia}, ${estacao}, Ano ${ano}`;
        document.getElementById('imagemItem').src = '';
        document.getElementById('imagemItem').alt = 'Selecione um item';
        itemSelecionadoPlantio = null;

        // Limpa destaque da seleção
        document.querySelectorAll(".item-plantio").forEach(el => el.classList.remove("selecionado"));
        document.getElementById('nomeItem').style.color = '#7C4B2B';
    }

    // Fecha modal
    document.getElementById('fecharModalPlantio').onclick = () => {
        modalPlantio.style.display = 'none';
        document.getElementById('nomeItem').style.color = '';
    };
    window.addEventListener('click', e => {
        if (e.target === modalPlantio) modalPlantio.style.display = 'none';
    });

    // Atualiza lista de itens conforme filtro selecionado
    function atualizarListaItensPlantio() {
        let listaFiltrada = jsonItens; 
        switch(filtroSelect.value) {
            case 'cultivaveis': listaFiltrada = listaFiltrada.filter(i => i.diaPlantio); break;
            case 'coleta': listaFiltrada = listaFiltrada.filter(i => i.tipo?.includes('coleta')); break;
            case 'fruta': listaFiltrada = listaFiltrada.filter(i => i.tipo?.includes('fruta')); break;
            case 'vegetal': listaFiltrada = listaFiltrada.filter(i => i.tipo?.includes('vegetal')); break;
            case 'arvore': listaFiltrada = listaFiltrada.filter(i => i.tipo?.includes('arvore')); break;
            case 'estacao': listaFiltrada = listaFiltrada.filter(i => i.estacao?.includes(estacaoAtual)); break;
        }

        renderizarItensPlantio(listaFiltrada);
    }

    // Renderiza os itens na lista lateral do modal
    function renderizarItensPlantio(itens) {
        listaItensContainer.innerHTML = "";
        if (!itens.length) {
            listaItensContainer.innerHTML = "<p>Nenhum item encontrado.</p>";
            return;
        }

        itens.forEach(item => {
            const itemDiv = document.createElement("div");
            itemDiv.className = "item-plantio";

            const estacoes = Array.isArray(item.estacao) ? item.estacao.join(", ") : item.estacao;
            const diasColheita = item.diasColheita || "-";

            itemDiv.title = `Estação: ${estacoes}, Recrescimento: ${diasColheita} dias`;
            itemDiv.innerHTML = `
                <img src="${item.imagem}" alt="${item.nome}">
                <p>${item.nome}</p>
            `;

            itemDiv.addEventListener("click", () => selecionarItemParaPlantio(item, itemDiv));
            listaItensContainer.appendChild(itemDiv);
        });
    }

    // Função para selecionar o item e atualizar barra lateral
    function selecionarItemParaPlantio(item, itemDiv) {
        itemSelecionadoPlantio = item;
        
        document.getElementById('nomeItem').textContent = item.nome;
        document.getElementById('imagemItem').src = `imagens/${item.imagem.replace(/\\/g, "/")}`; 
        document.getElementById('imagemItem').alt = item.nome;
        document.getElementById('nomeItem').style.color = '#38733C';

        document.querySelectorAll(".item-plantio").forEach(el => el.classList.remove("selecionado"));
        itemDiv.classList.add("selecionado");
    }

    /* Retorna o dia, estação e ano base para um novo evento. */
    function obterDiaBase() {
        if (!personagem || typeof personagem.ano === 'undefined') {
            personagem = { ano: 1, dia: 1, estacao: estacaoAtual || 'primavera', estufa: false };
        }

        const anoBase = personagem.ano || 1;
        const diaDoCalendario = Estacao[estacaoAtual]; 

        if (diaDoCalendario !== null && diaDoCalendario !== undefined) {
            return {
                dia: diaDoCalendario,
                estacao: estacaoAtual, 
                ano: anoBase
            };
        }

        return {
            dia: personagem.dia || 1,
            estacao: personagem.estacao || 'primavera',
            ano: anoBase
        };
    }

    // FUNÇÃO PRINCIPAL: Cria evento de plantio e calcula múltiplas colheitas
    function criarEventoPlantio(item) {
        const { dia, estacao, ano } = obterDiaBase(); 

        // --- Variáveis de Crescimento ---
        const diasParaPrimeiraColheita = item.diaPlantio || 0;
        const diasParaRecolheita = item.diasColheita || 0; // 0 significa colheita única
        const estacoesCrescimento = Array.isArray(item.estacao) ? item.estacao : [item.estacao];
        const estufaDesbloqueada = personagem.estufa || false;
        
        // --- Funções Auxiliares de Data ---
        function proximaEstacao(estacao) {
            const ordem = ["primavera", "verao", "outono", "inverno"];
            const idx = ordem.indexOf(estacao);
            return ordem[(idx + 1) % ordem.length];
        }
        
        let dataAtual = { dia, estacao, ano };
        const colheitas = [];
        let status = "Em andamento";
        let diasParaAvancar = diasParaPrimeiraColheita;

        // --- 1. Checagem de Viabilidade Inicial ---
        if (diasParaPrimeiraColheita > 0) {
            let tempDia = dia;
            let tempEstacao = estacao;
            for (let d = 0; d < diasParaPrimeiraColheita; d++) {
                tempDia++;
                if (tempDia > 28) {
                    tempDia = 1;
                    tempEstacao = proximaEstacao(tempEstacao);
                }
                if (!estufaDesbloqueada && !estacoesCrescimento.includes(tempEstacao)) {
                    alert(`⚠️ Plantação Impossível: O item '${item.nome}' requer ${diasParaPrimeiraColheita} dias para crescer, mas **morrerá** no dia ${tempDia} da ${tempEstacao}. Use a estufa ou escolha outro dia.`);
                    return; 
                }
            }
        }
        
        // --- 2. Cálculo da Primeira Colheita ---
        if (diasParaPrimeiraColheita > 0) {
            for (let i = 0; i < diasParaPrimeiraColheita; i++) {
                dataAtual.dia++;
                if (dataAtual.dia > 28) {
                    dataAtual.dia = 1;
                    dataAtual.estacao = proximaEstacao(dataAtual.estacao);
                    if (dataAtual.estacao === 'primavera') dataAtual.ano++;
                }
            }
            
            // Checa a sobrevivência no dia da colheita (caso tenha morrido *no* dia 1 da nova estação)
            if (!estufaDesbloqueada && !estacoesCrescimento.includes(dataAtual.estacao)) {
                status = `Falha (Morre no dia 1 de ${dataAtual.estacao})`;
            }
        }

        // --- 3. Cálculo de Colheitas Contínuas (Loop) ---
        if (!status.startsWith("Falha")) {
            if (diasParaPrimeiraColheita > 0) {
                colheitas.push({...dataAtual, tipo: "Primeira"});
            }

            if (diasParaRecolheita > 0) {
                let colheitaAtual = {...dataAtual};
                let maxColheitas = 6; // Limita o número de colheitas
                let c = 0;

                while (c < maxColheitas) {
                    c++;
                    diasParaAvancar = diasParaRecolheita;

                    // Avança o tempo para a próxima colheita contínua
                    for (let i = 0; i < diasParaAvancar; i++) {
                        colheitaAtual.dia++;
                        if (colheitaAtual.dia > 28) {
                            colheitaAtual.dia = 1;
                            colheitaAtual.estacao = proximaEstacao(colheitaAtual.estacao);
                            if (colheitaAtual.estacao === 'primavera') colheitaAtual.ano++;
                        }
                        
                        // Checagem de Morte durante o recrescimento
                        if (!estufaDesbloqueada) {
                             if (colheitaAtual.dia === 1 && !estacoesCrescimento.includes(colheitaAtual.estacao)) {
                                status = `Falha (Morre no dia 1 de ${colheitaAtual.estacao})`;
                                break; // Sai do loop de recrescimento
                            }
                        }
                    }
                    
                    if (status.startsWith("Falha")) break;

                    // Adiciona a colheita
                    colheitas.push({...colheitaAtual, tipo: `Recolheita ${c}`});
                }
            }
        }
        
        // --- Criação Final do Objeto Evento ---
        const novoEvento = {
            id: Date.now(),
            nome: item.nome,
            dataPlantio: `Dia ${dia} - ${estacao} - Ano ${ano}`,
            status: status,
            colheitas: colheitas.map(c => ({
                dia: c.dia,
                estacao: c.estacao,
                ano: c.ano,
                tipo: c.tipo
            }))
        };

        // Adiciona e renderiza
        eventosPess.push(novoEvento);
        salvarPessStorage();
        renderizarPainelPess();

        modalPlantio.style.display = 'none';
    }

    // Atualiza itens ao mudar filtro
    filtroSelect.addEventListener('change', atualizarListaItensPlantio);
</script>

<script>
// pnEsq
let eventosPess = [];
const STORAGE_KEY_PESS = "sv_eventos_pess";

const painelPess = document.getElementById("painelPess");
const togglePessBtn = document.getElementById("togglePessBtn");

// --- FUNÇÕES DE STORAGE ---
function carregarPessStorage() {
    const raw = localStorage.getItem(STORAGE_KEY_PESS);
    eventosPess = raw ? JSON.parse(raw) : [];
}

function salvarPessStorage() {
    localStorage.setItem(STORAGE_KEY_PESS, JSON.stringify(eventosPess));
}

// --- AÇÕES DO USUÁRIO ---

// Substituindo o confirm() chato por um modal temático
async function excluirEventoPess(id) {
    const resultado = await Swal.fire({
        title: 'Excluir tarefa?',
        text: "O Junimo ficará triste, mas você pode reagendar depois!",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#723333', // Tom de madeira escura
        cancelButtonColor: '#607d8b',
        confirmButtonText: 'Sim, excluir!',
        cancelButtonText: 'Cancelar',
        background: '#f4e4bc', // Cor de pergaminho
        color: '#432d18'      // Texto marrom escuro
    });

    if (resultado.isConfirmed) {
        carregarPessStorage();
        eventosPess = eventosPess.filter(ev => ev.id !== id);
        salvarPessStorage();
        renderizarPainelPess();
        
        // Toast de confirmação (não bloqueante)
        Swal.fire({
            toast: true,
            position: 'top-end',
            icon: 'success',
            title: 'Tarefa removida!',
            showConfirmButton: false,
            timer: 2000,
            background: '#d4edda'
        });
    }
}

// Função de Edição (Agora abrindo um modal de verdade)
function editarEventoPess(id) {
    const evento = eventosPess.find(ev => ev.id === id);
    if (!evento) return;

    // Aqui você chamaria sua função de abrir o formulário
    // passando os dados do 'evento' para preencher os inputs.
    abrirModalEdicao(evento); 
}

// --- RENDERIZAÇÃO ---
function renderizarPainelPess() {
    carregarPessStorage();
    const container = document.getElementById("listaPess");
    container.innerHTML = "";
    
    if (eventosPess.length === 0) {
        container.innerHTML = "<p style='padding: 10px; color: #666; font-style: italic;'>Nenhuma tarefa de plantio...</p>";
        return;
    }

    eventosPess.forEach(ev => {
        const box = document.createElement("div");
        box.className = "caixa-evento animated fadeIn"; // Adicione uma classe de animação se tiver
        
        const listaColheitasHTML = ev.colheitas && ev.colheitas.length > 0
            ? ev.colheitas.map(c => 
                `<li>✨ ${c.tipo}: Dia ${c.dia} (${c.estacao})</li>`
              ).join('')
            : '<li>Nenhuma colheita prevista.</li>';

        box.innerHTML = `
            <div class="header-evento">
                <strong>${ev.nome}</strong>
                <span class="status ${ev.status.toLowerCase().replace(/\s/g, '-')}" title="Status">${ev.status}</span>
            </div>
            <div class="info-plantio">📅 Plantio: ${ev.dataPlantio}</div>
            <ul class="lista-colheitas">${listaColheitasHTML}</ul>
            <div class="acoes">
                <button class="btn-edit" onclick="editarEventoPess(${ev.id})">📝 Editar</button>
                <button class="btn-delete" onclick="excluirEventoPess(${ev.id})">🗑️</button>
            </div>
        `;
        container.appendChild(box);
    });
}

// UI: Abrir/Fechar
togglePessBtn.addEventListener("click", () => {
    painelPess.classList.toggle("retraido");
    togglePessBtn.innerHTML = painelPess.classList.contains("retraido") ? "<span>❯</span>" : "<span>❮</span>";
});

window.addEventListener("DOMContentLoaded", renderizarPainelPess);
</script>
